  <!-- Theme & favicon -->
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="/" class="nav__logo">
        <span class="nav__logo-dot" aria-hidden="true"></span>
        claudio
      </a>

      <button class="nav__hamburger" aria-label="Toggle menu" aria-expanded="false" id="hamburger">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav__links" id="nav-links" role="list">
        <li>
          <a href="https://github.com/claudio-labs/claudio" class="nav__link nav__link--github" target="_blank" rel="noopener noreferrer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
            GitHub
          </a>
        </li>
        <li><a href="docs.html" class="nav__link">Docs</a></li>
        <li><a href="changelog.html" class="nav__link" style="color: var(--color-accent)">Changelog</a></li>
        <li><a href="docs.html#install" class="nav__cta">Install</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="page-hero">
      <h1 class="page-hero__title">Changelog</h1>
      <p class="page-hero__sub">Release history for <code>@claudiolabs/claudio</code></p>
    </div>

    <div class="changelog-list" id="changelog-list">
      <p style="color: var(--color-text-dim); font-family: var(--font-mono); font-size: var(--text-sm);">Loading...</p>
    </div>
  </div>

  <script>
    fetch('/changelog-data.json')
      .then(r => r.json())
      .then(releases => {
        const list = document.getElementById('changelog-list');
        list.innerHTML = releases.map(r => {
          const id = r.version.replace(/\./g, '-');
          const items = r.skip
            ? `<p class="changelog-skip">${r.skip}</p>`
            : r.items.map(item => {
                const scope = item.scope ? `<span class="scope">${item.scope}</span> — ` : '';
                return `<div class="changelog-item">
                  <span class="changelog-badge changelog-badge--${item.type}">${item.type}</span>
                  <span class="changelog-item-text">${scope}${item.text}</span>
                </div>`;
              }).join('');
          return `<article class="changelog-entry" id="${id}">
            <div class="changelog-version">
              <span class="changelog-version-num">${r.version}</span>
              <span class="changelog-date">${r.date}</span>
            </div>
            ${r.items.length > 0 ? `<div class="changelog-items">${items}</div>` : items}
          </article>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('changelog-list').innerHTML =
          '<p style="color:var(--color-text-dim)">Failed to load changelog.</p>';
      });
  </script>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__bottom" style="border-top: 1px solid var(--color-border); padding-top: var(--space-6);">
        <a href="/" style="font-family: var(--font-mono); font-weight: 600; display: flex; align-items: center; gap: var(--space-2);">
          <span class="nav__logo-dot" aria-hidden="true"></span>claudio
        </a>
        <span style="color: var(--color-text-dim); font-size: var(--text-xs)">Independent project. Not affiliated with Anthropic.</span>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
